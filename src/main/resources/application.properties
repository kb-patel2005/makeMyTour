spring.application.name=makemytrip
server.port=8080
# spring.data.mongodb.uri=mongodb://localhost:27017/krish
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/krish}
spring.data.mongodb.database=makemytrip
spring.data.mongodb.auto-index-creation=true
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.springframework.data.mongodb.repository.Query=DEBUG
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB